    <meta charset="UTF-8">

    <!-- Primary Meta Tags -->

    <meta name="title" content="Contact Guardian Rafting Tours | Book Your Next River Adventure">

        content="Get in touch with Guardian Rafting Tours for questions, bookings, or group rafting adventures. Our team is ready to help you plan a safe and thrilling river experience.">

    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.guardianrafting.com/contact.html">
    <meta property="og:title" content="Contact Guardian Rafting Tours | Book Your Next River Adventure">
    <meta property="og:description"
        content="Reach out to Guardian Rafting Tours to plan your next whitewater rafting experience. We’re here to answer your questions and help you book safely.">
    <meta property="og:image" content="https://www.guardianrafting.com/images/contact-preview.jpg">

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://www.guardianrafting.com/contact.html">
    <meta name="twitter:title" content="Contact Guardian Rafting Tours | Book Your Next River Adventure">
    <meta name="twitter:description"
        content="Contact our expert team to plan your next river adventure or group trip with Guardian Rafting Tours. Safety, fun, and unforgettable experiences.">
    <meta name="twitter:image" content="https://www.guardianrafting.com/images/contact-preview.jpg">

    <link rel="stylesheet" href="styles/rafting.css">
</head>


<body>
    <header>
        <div class="hero-image">
            <img src="images/homep.webp" alt="" width="840" height="400">
        </div>
        <nav>
            <div class="logo">
                <img src="images/logo2.png" alt="Rafting" width="200">
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="Trip.html">Trips</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street<br>
                Kolob, California<br>
                +1 999 999 9999<br>
                <a href="mailto:info@whitewater.com">info@whitewater.com</a>
            </p>
        </section>

        <section class="contact-container">
            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d63651.39876802792!2d15.325593599999998!3d-4.3712512!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sfr!2scd!4v1759653919896!5m2!1sfr!2scd"
                    width="400" height="400" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form class="contact-form" action="#" method="post">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Placeholder" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Placeholder" required>


                <fieldset class="message-purpose">
                    <legend>Message Purpose</legend>

                    <label>
                        <input type="radio" name="purpose" value="general" checked>
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>
                </fieldset>

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Type here" rows="5"></textarea>

                <label>
                    <input type="checkbox" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch!</button>
            </form>
        </section>

        <section class="team">
            <h2>We Are Here to Serve You</h2>
            <div class="employees">
                <div class="employee">
                    <img src="images/p1.jpg" alt="Employee Profile">
                    <figcaption>
                        <strong>Marco Diaz</strong><br>
                        Operations Manager
                    </figcaption>
                </div>
                <div class="employee">
                    <img src="images/p2.jpg" alt="Employee Profile">
                    <figcaption>
                        <strong>Liam O'Connor</strong><br>
                        Customer Relations
                    </figcaption>
                </div>
                <div class="employee">
                    <img src="images/p3.jpg" alt="Employee Profile">
                    <figcaption>
                        <strong>Priya Patel</strong><br>
                        Safety Officer
                    </figcaption>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 💦Guardian Rafting Tours💦 Jean Marc Kanda</p>
        <section class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon" width="100">
            </a>

            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="linkedin Icon" width="100">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="intagram Icon" width="100">
            </a>
        </section>
    </footer>
</body>

</html>
